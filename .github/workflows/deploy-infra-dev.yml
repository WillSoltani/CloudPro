name: Deploy Infra (Dev)

on:
  push:
    branches:
      - main
    paths:
      - 'infra/**'
      - '.github/workflows/deploy-infra-dev.yml'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-infra-dev
  cancel-in-progress: false

env:
  AWS_REGION: us-east-1
  CDK_STACK_NAME: CloudPortfolioStorage

jobs:
  deploy-dev:
    name: Deploy CDK Stack to Dev
    runs-on: ubuntu-latest
    timeout-minutes: 45
    defaults:
      run:
        working-directory: infra

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: infra/package-lock.json

      - name: Install infra dependencies
        run: npm ci

      - name: Debug OIDC claims
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${ACTIONS_ID_TOKEN_REQUEST_URL:-}" ] || [ -z "${ACTIONS_ID_TOKEN_REQUEST_TOKEN:-}" ]; then
            echo "Missing GitHub OIDC environment variables."
            exit 1
          fi

          RESPONSE="$(curl -sS -H "Authorization: bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=sts.amazonaws.com")"
          TOKEN="$(node -e "const r = JSON.parse(process.argv[1]); if (!r.value) process.exit(2); process.stdout.write(r.value);" "${RESPONSE}")"

          node - "${TOKEN}" <<'NODE'
          const token = process.argv[2];
          const parts = token.split(".");
          if (parts.length < 2) {
            throw new Error("Invalid OIDC token");
          }
          const payload = JSON.parse(Buffer.from(parts[1], "base64url").toString("utf8"));
          const keys = [
            "iss",
            "aud",
            "sub",
            "repository",
            "repository_owner",
            "ref",
            "workflow",
            "job_workflow_ref",
            "actor",
          ];
          const output = {};
          for (const key of keys) {
            if (payload[key] !== undefined) output[key] = payload[key];
          }
          console.log("OIDC_CLAIMS", JSON.stringify(output, null, 2));
          NODE

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME_DEV }}
          aws-region: ${{ env.AWS_REGION }}

      - name: CDK deploy
        run: npm run cdk -- deploy $CDK_STACK_NAME --require-approval never
