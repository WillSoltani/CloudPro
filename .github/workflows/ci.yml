name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  app-checks:
    name: App Build + Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      NEXT_TELEMETRY_DISABLED: "1"
      COGNITO_REGION: "us-east-1"
      COGNITO_USER_POOL_ID: "ci-user-pool"
      SECURE_DOC_TABLE: "ci-table"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --include=optional

      - name: Restore Next.js build cache
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('package-lock.json', 'app/**/*.ts', 'app/**/*.tsx', 'components/**/*.ts', 'components/**/*.tsx', 'next.config.ts', 'postcss.config.mjs') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-

      - name: Build app
        run: npm run build

      - name: Run PDF fill tests
        run: npm run test:pdf-fill

  infra-checks:
    name: Infra Build + CDK Synth
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: infra
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: infra/package-lock.json

      - name: Install infra dependencies
        run: npm ci

      - name: Build infra TypeScript
        run: npm run build

      - name: CDK synth
        run: npm run cdk -- synth
