<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 1400" role="img" aria-labelledby="title desc">
  <title id="title">How to Win Friends and Influence People book cover</title>
  <desc id="desc">A classic white, red, and black cover inspired by the original How to Win Friends and Influence People design.</desc>
  <defs>
    <linearGradient id="paper" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#fffefd"/>
      <stop offset="100%" stop-color="#fbf7f2"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#ef3f2b"/>
      <stop offset="100%" stop-color="#ff4d34"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#140705" flood-opacity="0.18"/>
    </filter>
  </defs>

  <rect width="900" height="1400" rx="44" fill="url(#paper)"/>
  <rect x="0" y="48" width="900" height="86" fill="url(#accent)"/>
  <rect x="0" y="1160" width="900" height="240" fill="url(#accent)"/>
  <text x="450" y="108" fill="#fff6ee" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="32" letter-spacing="4">INTERNATIONAL BESTSELLER</text>

  <g filter="url(#shadow)">
    <rect x="108" y="210" width="684" height="872" rx="8" fill="rgba(255,255,255,0.68)"/>
  </g>

  <text x="450" y="318" fill="#1a1414" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="92" letter-spacing="2">HOW TO</text>
  <line x1="250" x2="650" y1="346" y2="346" stroke="#ef3f2b" stroke-width="4" opacity="0.8"/>
  <text x="450" y="512" fill="#f14834" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="178" letter-spacing="5">WIN</text>
  <text x="450" y="668" fill="#171313" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="122" letter-spacing="2">FRIENDS &amp;</text>
  <text x="450" y="826" fill="#171313" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="116" letter-spacing="2">INFLUENCE</text>
  <text x="450" y="998" fill="#f14834" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="160" letter-spacing="5">PEOPLE</text>

  <g transform="translate(100 1088)">
    <rect x="0" y="0" width="246" height="246" fill="#e7d2be" stroke="#fff2e6" stroke-width="6"/>
    <rect x="22" y="22" width="202" height="202" fill="#7f6657" opacity="0.25"/>
    <circle cx="122" cy="94" r="48" fill="#ceb39a"/>
    <path d="M60 208c18-58 46-86 96-86 50 0 76 28 98 86" fill="#8c725d"/>
    <path d="M90 92c8-38 30-57 63-57 19 0 34 9 43 25" fill="none" stroke="#6d5a4c" stroke-width="8" stroke-linecap="round"/>
    <rect x="74" y="92" width="28" height="16" rx="6" fill="#69594f" opacity="0.55"/>
    <rect x="146" y="92" width="28" height="16" rx="6" fill="#69594f" opacity="0.55"/>
    <path d="M100 152c12 10 35 15 50 15 17 0 32-4 46-15" stroke="#5c4f45" stroke-width="6" fill="none" stroke-linecap="round"/>
  </g>

  <text x="398" y="1268" fill="#fff5ee" font-style="italic" font-family="Georgia, 'Times New Roman', serif" font-size="62">by</text>
  <text x="520" y="1268" fill="#fff5ee" font-family="Georgia, 'Times New Roman', serif" font-size="106" letter-spacing="2">DALE</text>
  <text x="450" y="1362" fill="#fff5ee" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="88" letter-spacing="3">CARNEGIE</text>
</svg>
