  <text x="450" y="1272" text-anchor="middle" fill="#f0dfc0" font-family="Georgia, 'Times New Roman', serif" font-size="58">A modern reading of strategy, incentives, and leadership</text>
  <text x="450" y="1344" text-anchor="middle" fill="#f0dfc0" font-family="Georgia, 'Times New Roman', serif" font-size="44" letter-spacing="2">FOR STUDENTS AND EARLY CAREER BUILDERS</text>
