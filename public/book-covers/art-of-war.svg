<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 1400" role="img" aria-labelledby="title desc">
  <title id="title">The Art of War book cover</title>
  <desc id="desc">A dark cover with a red header, large serif title, and a red emblem inspired by a classic Art of War design.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#07141a"/>
      <stop offset="100%" stop-color="#061116"/>
    </linearGradient>
  </defs>
  <rect width="900" height="1400" rx="42" fill="url(#bg)"/>
  <rect x="0" y="0" width="900" height="220" fill="#c51a22"/>
  <text x="450" y="135" text-anchor="middle" fill="#f4dcb0" font-family="Georgia, 'Times New Roman', serif" font-size="104" letter-spacing="8">SUN TZU</text>
  <rect x="112" y="256" width="172" height="62" rx="8" fill="#c51a22" stroke="#f4dcb0" stroke-width="3"/>
  <text x="198" y="298" text-anchor="middle" fill="#f7ead0" font-family="Arial, sans-serif" font-size="36" font-weight="700" letter-spacing="5">TUTTLE</text>
  <text x="450" y="430" text-anchor="middle" fill="#f2dfbf" font-family="Georgia, 'Times New Roman', serif" font-size="96" letter-spacing="4">THE</text>
  <text x="450" y="650" text-anchor="middle" fill="#f2dfbf" font-family="Georgia, 'Times New Roman', serif" font-size="202" letter-spacing="6">ART</text>
  <text x="450" y="810" text-anchor="middle" fill="#f2dfbf" font-family="Georgia, 'Times New Roman', serif" font-size="104" letter-spacing="5">OF</text>
  <text x="450" y="1040" text-anchor="middle" fill="#f2dfbf" font-family="Georgia, 'Times New Roman', serif" font-size="210" letter-spacing="8">WAR</text>
  <g transform="translate(450 1125)">
    <path d="M-92 40c18-38 44-67 76-84 24-13 52-19 83-18-13 13-27 27-32 46 43 10 80 38 104 75-34-14-75-18-114-8 10 8 18 18 22 31-31-8-64-7-96 5 5-15 17-31 33-42-31-3-58-1-76 8z" fill="#d21923"/>
    <path d="M-8 -18c11-24 30-41 55-53-2 13-4 25 1 36 23 6 45 18 61 37-18-4-38-4-58 2 7 6 10 13 11 22-18-4-36-2-53 6 1-10 7-20 16-28-17-2-28-1-33 1z" fill="#07141a" opacity="0.16"/>
